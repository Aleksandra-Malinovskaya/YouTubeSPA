name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build
        env:
          VITE_YOUTUBE_API_KEY: ${{ secrets.VITE_YOUTUBE_API_KEY }}
          VITE_YOUTUBE_AUTH_LINK: ${{ secrets.VITE_YOUTUBE_AUTH_LINK }}
          VITE_YOUTUBE_SEARCH_LINK: ${{ secrets.VITE_YOUTUBE_SEARCH_LINK }}
          VITE_YOUTUBE_STATISTICS_LINK: ${{ secrets.VITE_YOUTUBE_STATISTICS_LINK }}

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
